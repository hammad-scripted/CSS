<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        position: relative;
        width: 300px;
        height: 300px;
        background-color: lightblue;
      }
      .child {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rebeccapurple;
        color: white;
        padding: 10px 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child">Hello</div>
    </div>
  </body>
</html>
