<!doctype html>
<html>
  <head>
    <style>
      p {
        color: red;
      }

      .myClass {
        color: blue;
      }

      #myId {
        color: green;
      }

      div p {
        font-size: 20px;
      }
    </style>
  </head>

  <body>
    <h2>Css Selectors</h2>
    <p>Normal paragraph</p>
    <p class="myClass">Class paragraph</p>
    <p id="myId">ID paragraph</p>

    <div>
      <p>Inside div</p>
    </div>
  </body>
</html>
